site_name: madakit
site_url: https://madakit.readthedocs.io
site_description: Composable AI client library — cloud, local, and native providers behind one async interface, layered with middleware.
site_author: Mada Hub

repo_name: Madahub-dev/madakit
repo_url: https://github.com/Madahub-dev/madakit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - autorefs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Tutorial: tutorial.md
  - User Guide:
      - Overview: user-guide.md
      - Providers: getting-started/providers.md
      - Middleware: getting-started/middleware.md
      - Configuration: getting-started/configuration.md
      - Framework Integrations: getting-started/integrations.md
  - Architecture:
      - Design Principles: architecture.md
      - Extension Guide: extension-guide.md
  - API Reference:
      - Complete API: api-reference.md
  - Contributing:
      - Guidelines: contributing.md
      - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Madahub-dev/madakit
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/madakit/

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 Mada Hub
